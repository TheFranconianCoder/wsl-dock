version: '3'

tasks:
  check:
    cmds:
      - task: build-flags
      - mise x -- clang-format -i src/*.[ch]
      - mise x -- clang-tidy src/*.[ch]
    sources:
      - src/*
      - .clang-*

  build:
    desc: Build WslDock
    deps: [check]
    cmds:
      - |
        if [ -f "./zig-out/bin/WslDock-windows-x86_64.exe" ]; then
          mv ./zig-out/bin/WslDock-windows-x86_64.exe ./zig-out/bin/WslDock-windows-x86_64.exe~
        fi
      - mise x -- zig build
      - rm -f ./zig-out/bin/WslDock-windows-x86_64.exe~
    sources:
      - src/*
    generates:
      - ./zig-out/bin/WslDock-windows-x86_64.exe

  run:
    desc: Run WslDock
    deps: [build]
    cmd: cmd /c start "" "./zig-out/bin/WslDock-windows-x86_64.exe"

  build-flags:
    cmd: mise x -- zig build compile-flags

  release:
    desc: 'Create new release and publish on GitHub (Usage: task release VERSION=0.2.0)'
    summary: |
      Commits version bumps, builds the binary, and publishes to GitHub.
      Requires: Zig and GitHub CLI (gh). Version must be bumped, and
      release_title.txt + release_notes.md must exist before running.
    cmds:
      # 1. Commit version bump and push
      - git add src/app_state.h resource.rc
      - 'git commit -m "chore: prepare release v{{.VERSION}}"'
      - git push
      - echo "Changes committed and pushed to origin."

      # 2. Build and publish
      - mise x -- zig build
      - |
        mise x -- gh release create "v{{.VERSION}}" \
          ./zig-out/bin/WslDock-windows-x86_64.exe \
          --title "v{{.VERSION}}: $(cat release_title.txt)" \
          --notes-file release_notes.md
      - rm release_title.txt release_notes.md
      - echo "Release v{{.VERSION}} successfully published!"
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: 'Error: VERSION variable is missing. Example: task release VERSION=0.2.0'
      - sh: 'mise x -- gh auth status'
        msg: 'Error: You must be logged into the GitHub CLI (gh auth login).'
      - sh: 'test -f release_title.txt'
        msg: "Error: 'release_title.txt' missing."
      - sh: 'test -f release_notes.md'
        msg: "Error: 'release_notes.md' missing."
      - sh: 'git diff --exit-code'
        msg: 'Error: You have uncommitted changes. Please stash or commit them first.'
